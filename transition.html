<!DOCTYPE html>
<html>
<head>
    <style>
        div{
            width: 100px;
            height: 100px;
            background-color: blue;
            transition-property: width;
            transition-duration: 3s;
            transform: rotate(45deg);
            transform: scale(100px,200px);
            
        }
        div:hover{
            width: 200px;
            background-color: antiquewhite;
        }
    </style>
    <body>
        <div></div>
    </body>
</head>
</html>
