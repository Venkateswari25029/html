<!DOCTYPE html>
<html>
<head>
  
  <title>Shopping Hub Products</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      grid-template-columns: 200px auto;
      grid-template-areas:
        "header header"
        "sales sales"
        "sidebar products"
        "footer footer";
      gap: 10px;
      padding: 10px;
    }

    .header {
      grid-area: header;
      background-color: burlywood;
      color: brown;
      padding: 20px;
      text-align: center;
      font-size: large;
      font-style: italic;
    }

    .sales {
      grid-area: sales;
      background-color: cadetblue;
      text-align: center;
      padding: 5px;
      font-size: medium;
      font-style: italic;
    }

    .sidebar {
      grid-area: sidebar;
      background-color: chartreuse;
      padding: 15px;
      text-align: center;
    }

    .products {
      grid-area: products;
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 15px;
      padding: 10px;
      background-color: coral;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      background: #fff;
    }

    

    .card h3 {
      margin: 10px 0 5px;
      font-size: 16px;
    }

    .card p {
      font-size: 14px;
      margin: 5px 0;
    }

    .card button {
      margin-top: 8px;
      padding: 6px 12px;
      border: none;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }

    .card button:hover {
      background-color: #0056b3;
    }

    .footer {
      grid-area: footer;
      background-color: darkgray;
      text-align: center;
      padding: 5px;
      font-size: larger;
    }
  </style>
</head>
