<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            background-color: aliceblue;
        }
        .container{
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
            background-color: whitesmoke;
            margin: 0 auto;
            max-width: 600px;
        }
        .card{
           border: 1px solid #ccc;
           border-radius: 8px;
           width: 200px;
           height: 270px;
           padding: 15px;
            text-align: center;
           box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
          background-color: #fff;
        }
        .button{
            margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
        }
        .button:hover{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
        <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcRqs0vBQEHK6i_J2BIMx9rsWReTLnks-a3ejCB7ZGKQI_dsZ3wGBqemdzRWGnBMVtLJP3yl5W3jYSaxj4SUVFyLpwd_wfgMRuSFO8dDr61a-1lAW4SuJiXk" alt="app1" width="180px">
        <p>Price-Rs1700/-</p>
        <button>More Options</button></div>
        <div class="card">
            <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcSfzgawySJ-NUkMUK5Y88zb8qcl9waV9BDYbvrndpmOkwHSwykWJrzuv6GzVCP8RkIGrJY1oCNDkI8OqCbIef0yvj78PELYa_0jamW8s8W20nGHctJqtLGo" alt="app2s" width="180px">
            <p>Price Rs2500/-</p>
            <button>More options</button>
        </div>
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/shopping?q=tbn:ANd9GcQhT9TA4esfSps-kxd6YE0iuAxC9NucfR3vSqatTdMNl42hS4ueBbw4UyUDw6H_ujZlyF1_0ezp18ubauTTwvRQoJqVBAe3K-DMzxM1aB1A2A2nyo2-Bx3q" alt="app3" width="180px">
            <p>Price-rs3000/-</p>
            <button>More Options</button>
        </div>
        <div class="card">
            <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcQWkmMAN3Jxd0LPIubpzgW8p6LxgS-d3n9DdwvHi88-zlRtPFvKzBMMRHUMgSG_eQ-0K2Q_cdwH_H5cyMf6TbyFPinatg0c6D-ATHcIY06Brem3wQ-hL5ZyLg" alt="app4" width="150px">
            <p>Price-Rs1500/-</p>
            <button>More options</button>
        </div>
    </div>
</body>
</html>
