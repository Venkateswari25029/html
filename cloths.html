<!DOCTYPE html>
<html>
<head>
    <style>
        body{
            background-color: aliceblue;    
        }
        .container{
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
            background-color: whitesmoke;
            margin: 0 auto;
            max-width: 600px;
        
        }
        .card{
           border: 1px solid #ccc;
           border-radius: 8px;
           width: 200px;
           height: 270px;
           padding: 15px;
            text-align: center;
           box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
          background-color: #fff;
        }
        .button{
            margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
        }
        .button:hover{
            background-color: aqua;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
        <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcSLR1Lr-zxrU8PvQgZGsRr-bax6kDIgJ44sjo6d8hLdcCiKF_0pUJwMTaxWmUgz42NY9QLBl9CY_gxbvNKOh6MJKX2UkbDwehTDFySKTYnfv9AgY--wV6CEvw" alt="sarees" width="180px">
        <p>Price-Rs2000/-</p>
        <button>More Options</button></div>
        <div class="card">
            <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcSTccpC9mbIXXeK6BXPtD-Qh_yBQ-2YM3nkCT6ei5NzyWB8_YWJ54TDydECeTyNs3SbVhooNEsYLkQsNp7jhsZ5uZL3cT_58uj1oqxSKt6O4AWTCKvQV2j3" alt="jeans" width="180px">
            <p>Price Rs2500/-</p>
            <button>More options</button>
        </div>
        <div class="card">
            <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcS2agzN8XCBO4YaQVyFktJXOReuQT7LsVDgvpf2aoWgOXHZq06twfOF3Sb_O5iNSsHe3h-ZQoPwyyyNiJ8LH8vkXtTfTxzgO3M15TrTFQOAlpjmhtfUZdCG" alt="kurtis" width="180px">
            <p>Price-rs3000/-</p>
            <button>More Options</button>
        </div>
        <div class="card">
            <img src="https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcRn67_A1GdqAZf2AKZSQfubRJIlC0wKXiZdapheYMz-jkiu4pSA88kb10kU0sG2eSJalSN0uExYQTISD9Yf5q1rPplFyD_3149g6eNK4n-O8peyOI_3EMEe" alt="frocks" width="150px">
            <p>Price-Rs1500/-</p>
            <button>More options</button>
        </div>
    </div>
</body>
</html>
