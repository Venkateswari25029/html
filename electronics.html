<!DOCTYPE html>
<html>
<head>
  <style>
    .card-container {
      display: flex;
      gap: 20px; 
      justify-content: center; 
      margin-top: 30px;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 200px;
      padding: 15px;
      text-align: center;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
      background-color: #fff;
    }
    .card img {
      width: 100%;
      height: auto;
      border-radius: 5px;
    }
    .card h3 {
      margin: 10px 0;
    }
    .card p {
      font-weight: bold;
      color: #333;
    }
    .card button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }
    .card button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card">
      <img src="galaxy-s26.jpg" alt="Galaxy S26">
      <h3>Galaxy S26</h3>
      <p>Price: Rs 30,000/-</p>
      <button>About</button>
    </div>
    <div class="card">
      <img src="lenovo-tab.jpg" alt="Lenovo Tab">
      <h3>Lenovo Tab</h3>
      <p>Price: Rs 12,990/-</p>
      <button>About</button>
    </div>
    <div class="card">
      <img src="galaxy-tab-a11.jpg" alt="Galaxy Tab A11">
      <h3>Galaxy Tab A11</h3>
      <p>Price: Rs 16,999/-</p>
      <button>About</button>
    </div>
  </div>
</body>
</html>
