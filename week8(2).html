<!DOCTYPE html>
<html>
    <head>
        <style>
            div{
                width: 200px;
                height: 200px;
                background-color: greenyellow;
                margin: auto;
                animation: circle 2s linear infinite;
                animation-direction: alternate;
                border-radius: 200%;
                position: relative;
            }
            @keyframes circle{
                from{
                  top: 0px;
                }
                to{
                   top: 100px;
                }
            }
        </style>
    </head>
    <body>
        <h2 style="text-align: center; font-style: italic; color: blue;">A circle bouncing top and bottom</h2>
        <div></div>
    </body>
</html>
